<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">obsmcp overview</title>
  <desc id="desc">Overview graphic showing obsmcp as a continuity, context, and code understanding layer for AI development.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect x="40" y="40" width="1200" height="640" rx="28" fill="#111827" stroke="#334155" stroke-width="2"/>
  <text x="80" y="115" fill="#f8fafc" font-family="Segoe UI, Arial, sans-serif" font-size="46" font-weight="700">obsmcp</text>
  <text x="80" y="160" fill="#93c5fd" font-family="Segoe UI, Arial, sans-serif" font-size="23">Project continuity + task memory + semantic code understanding for MCP-native AI workflows</text>
  <rect x="80" y="205" width="1120" height="8" rx="4" fill="url(#accent)"/>

  <rect x="80" y="250" width="350" height="170" rx="20" fill="#0b1220" stroke="#1e293b"/>
  <text x="105" y="295" fill="#f8fafc" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">Continuity Layer</text>
  <text x="105" y="335" fill="#cbd5e1" font-family="Segoe UI, Arial, sans-serif" font-size="21">Tasks, handoffs, blockers,</text>
  <text x="105" y="365" fill="#cbd5e1" font-family="Segoe UI, Arial, sans-serif" font-size="21">sessions, resume safety,</text>
  <text x="105" y="395" fill="#cbd5e1" font-family="Segoe UI, Arial, sans-serif" font-size="21">startup preflight, resume board.</text>

  <rect x="465" y="250" width="350" height="170" rx="20" fill="#0b1220" stroke="#1e293b"/>
  <text x="490" y="295" fill="#f8fafc" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">Context Engine</text>
  <text x="490" y="335" fill="#cbd5e1" font-family="Segoe UI, Arial, sans-serif" font-size="21">Fast, balanced, deep, delta,</text>
  <text x="490" y="365" fill="#cbd5e1" font-family="Segoe UI, Arial, sans-serif" font-size="21">retrieval context, progressive</text>
  <text x="490" y="395" fill="#cbd5e1" font-family="Segoe UI, Arial, sans-serif" font-size="21">loading, token-aware startup.</text>

  <rect x="850" y="250" width="350" height="170" rx="20" fill="#0b1220" stroke="#1e293b"/>
  <text x="875" y="295" fill="#f8fafc" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">Code Intelligence</text>
  <text x="875" y="335" fill="#cbd5e1" font-family="Segoe UI, Arial, sans-serif" font-size="21">Code Atlas, semantic search,</text>
  <text x="875" y="365" fill="#cbd5e1" font-family="Segoe UI, Arial, sans-serif" font-size="21">module/symbol descriptions,</text>
  <text x="875" y="395" fill="#cbd5e1" font-family="Segoe UI, Arial, sans-serif" font-size="21">related-symbol expansion.</text>

  <rect x="80" y="460" width="1120" height="165" rx="24" fill="#08111d" stroke="#1e293b"/>
  <text x="110" y="510" fill="#f8fafc" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">Why developers use it</text>
  <text x="110" y="550" fill="#cbd5e1" font-family="Segoe UI, Arial, sans-serif" font-size="22">One project-scoped memory layer for Codex, Claude Code, Cursor, Warp, and custom MCP clients.</text>
  <text x="110" y="584" fill="#cbd5e1" font-family="Segoe UI, Arial, sans-serif" font-size="22">Safer restarts, less prompt replay, better token discipline, and auditable AI work over time.</text>
</svg>
