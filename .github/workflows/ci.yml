name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python:
    name: Python lint & tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Ruff
        run: ruff check .
      - name: Mypy
        run: mypy --install-types --non-interactive || true
      - name: Pytest
        run: pytest -q

  frontend:
    name: Frontend build & typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: npm install --no-audit --no-fund
      - name: Typecheck
        run: npm run typecheck
      - name: Build
        run: npm run build

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [python, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image
        run: docker build -t obsmcp:ci .
